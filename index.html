<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>TechMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="logo">TechMarket</div>

  <div class="search">
    <label>
      <input type="text" placeholder="Пошук товарів...">
    </label>
  </div>

  <a href="cart.html" class="cart">Кошик</a>
</header>

<nav class="categories">
  <div>Електроніка</div>
  <div>Смартфони</div>
  <div>Ноутбуки</div>
  <div>ТВ</div>
  <div>Аксесуари</div>
</nav>

<main class="container">

  <div class="card">
    <img src="">
    <h3>iPhone 14</h3>
    <p class="price">35 000 грн</p>
    <button>У кошик</button>
  </div>

  <div class="card">
    <img src="">
    <h3>Samsung S23</h3>
    <p class="price">30 000 грн</p>
    <button>У кошик</button>
  </div>

  <div class="card">
    <img src="">
    <h3>MacBook Air M2</h3>
    <p class="price">55 000 грн</p>
    <button>У кошик</button>
  </div>

  <div class="card">
    <img src="">
    <h3>AirPods Pro</h3>
    <p class="price">8 000 грн</p>
    <button>У кошик</button>
  </div>

  <div class="card">
    <img src="">
    <h3>PlayStation 5</h3>
    <p class="price">25 000 грн</p>
    <button>У кошик</button>
  </div>

  <div class="card">
    <img src="">
    <h3>Smart TV 55"</h3>
    <p class="price">22 000 грн</p>
    <button>У кошик</button>
  </div>

</main>
<script type="module" src="js/app.js"></script>
</body>
</html>
