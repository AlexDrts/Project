<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Кошик</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <a href="index.html" class="back-btn">
    ← Повернутися до магазину
  </a>
  <h1>Кошик</h1>
</header>

<div id="cartItems"></div>

<h2 id="total"></h2>

<h2>Оформлення замовлення</h2>

<form id="orderForm" class="order-form">

  <label>
    Ім'я:
    <input type="text" id="name" required>
  </label>

  <label>
    Телефон:
    <input type="tel" id="phone" required>
  </label>

  <label>
    Email:
    <input type="email" id="email" required>
  </label>

  <label>
    Місто:
    <select id="city">
      <option>Одеса</option>
      <option>Київ</option>
      <option>Львів</option>
      <option>Харків</option>
    </select>
  </label>

  <div class="form-group">
    <p>Спосіб доставки:</p>

    <label>
      <input type="radio" name="delivery" value="Нова Пошта" checked>
      Нова Пошта
    </label>

    <label>
      <input type="radio" name="delivery" value="Укрпошта">
      Укрпошта
    </label>
  </div>

  <div class="form-group">
    <p>Додаткові послуги:</p>

    <label>
      <input type="checkbox" id="gift">
      Подарункове пакування
    </label>

    <label>
      <input type="checkbox" id="insurance">
      Страхування товару
    </label>
  </div>

  <button type="submit">
    Оформити замовлення
  </button>

</form>

<script type="module" src="js/cartPage.js"></script>

</body>
</html>
